<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Test</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            color-scheme: light;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .container {
            width: min(640px, 100%);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .io-box {
            border-radius: 18px;
            border: 1px solid #dfe3ea;
            background: #f8f9fb;
            padding: 14px;
        }

        .section-title {
            margin: 0 0 10px;
            font-size: 14px;
            color: #334155;
            font-weight: 700;
        }

        .hint {
            margin: 0 0 10px;
            font-size: 13px;
            color: #64748b;
        }

        .field-row {
            display: grid;
            grid-template-columns: 88px 1fr;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .field-row input {
            width: 100%;
            height: 36px;
            border-radius: 8px;
            border: 1px solid #cfd7e6;
            padding: 0 10px;
            font-size: 14px;
            background: #fff;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-button {
            flex: 1 1 auto;
            min-width: 112px;
            height: 38px;
            border-radius: 10px;
            border: 1px solid #cfd7e6;
            background: #fff;
            font-size: 14px;
            font-weight: 600;
            color: #0f172a;
            cursor: pointer;
        }

        .action-button.primary {
            background: #1d4ed8;
            border-color: #1d4ed8;
            color: #fff;
        }

        textarea {
            width: 100%;
            border: none;
            background: transparent;
            resize: none;
            min-height: 140px;
            font-size: 14px;
            line-height: 1.5;
            color: #0f172a;
        }

        audio {
            width: 100%;
            margin-top: 8px;
        }

        .highlight {
            animation: pulse 0.45s;
        }

        @keyframes pulse {
            from {
                box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.35);
            }

            to {
                box-shadow: 0 0 0 10px rgba(0, 122, 255, 0);
            }
        }

        @media (max-width: 560px) {
            body {
                padding: 8px;
            }

            .container {
                width: 100%;
                gap: 10px;
            }

            .action-button {
                flex: 1 1 45%;
                min-width: 0;
            }

            .field-row {
                grid-template-columns: 72px 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="io-box">
            <textarea id="output-box" placeholder="Output" readonly></textarea>
        </div>

        <div class="io-box">
            <div class="section-title">Audio Debug</div>
            <p class="hint">Recommended flow: Check Ready -> Start -> Stop -> open Recording List for playback. "Read 2KB" is only for low-level file debug.</p>
            <div class="field-row">
                <label for="record-id-input">Record ID</label>
                <input id="record-id-input" placeholder="Auto-filled after Start, or paste from Recording List" />
            </div>
            <div class="field-row">
                <label for="export-path-input">Export Path</label>
                <input id="export-path-input" placeholder="e.g. C:/Users/xxx/Desktop/demo.wav" />
            </div>
            <div class="actions">
                <button id="perm-get-button" class="action-button">Get Perm</button>
                <button id="perm-req-button" class="action-button">Request Perm</button>
                <button id="ready-check-button" class="action-button">Check Ready</button>
                <button id="rec-start-button" class="action-button primary">Start</button>
                <button id="rec-pause-button" class="action-button">Pause</button>
                <button id="rec-resume-button" class="action-button">Resume</button>
                <button id="rec-stop-button" class="action-button">Stop</button>
                <button id="rec-cancel-button" class="action-button">Cancel</button>
                <button id="rec-status-button" class="action-button">Rec Status</button>
                <button id="rec-info-button" class="action-button">File Info</button>
                <button id="rec-read-button" class="action-button">Read 2KB (Debug)</button>
                <button id="rec-url-button" class="action-button">Get URL</button>
                <button id="rec-export-button" class="action-button">Export</button>
                <button id="interrupt-button" class="action-button">Interrupt</button>
                <button id="interrupt-end-button" class="action-button">Interrupt End</button>
                <button id="run-all-button" class="action-button">Run E2E</button>
                <button id="open-list-button" class="action-button">Open Recording List</button>
            </div>
        </div>
    </div>

    <script src="/bucky-api.js"></script>
    <script>
        const outputBox = document.getElementById("output-box");
        const recordIdInput = document.getElementById("record-id-input");
        const exportPathInput = document.getElementById("export-path-input");

        const permGetButton = document.getElementById("perm-get-button");
        const permReqButton = document.getElementById("perm-req-button");
        const readyCheckButton = document.getElementById("ready-check-button");
        const recStartButton = document.getElementById("rec-start-button");
        const recPauseButton = document.getElementById("rec-pause-button");
        const recResumeButton = document.getElementById("rec-resume-button");
        const recStopButton = document.getElementById("rec-stop-button");
        const recCancelButton = document.getElementById("rec-cancel-button");
        const recStatusButton = document.getElementById("rec-status-button");
        const recInfoButton = document.getElementById("rec-info-button");
        const recReadButton = document.getElementById("rec-read-button");
        const recUrlButton = document.getElementById("rec-url-button");
        const recExportButton = document.getElementById("rec-export-button");
        const interruptButton = document.getElementById("interrupt-button");
        const interruptEndButton = document.getElementById("interrupt-end-button");
        const runAllButton = document.getElementById("run-all-button");
        const openListButton = document.getElementById("open-list-button");

        const getRecordId = () => recordIdInput.value.trim();
        const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
        const query = new URLSearchParams(window.location.search);
        const directInvokeAvailable = Boolean(window.__TAURI_INTERNALS__ && typeof window.__TAURI_INTERNALS__.invoke === "function");
        const autoMode = query.get("autorun")?.trim() || (directInvokeAvailable ? "record-smoke" : "");

        const sessionStartedAt = new Date().toISOString();
        let logLines = [];

        const onApiEvent = (type) => (payload) => {
            appendLog(type, payload);
        };

        const eventHandlers = {
            recordingState: window.BuckyApi?.onEvent("recording_state_changed", onApiEvent("recording_state_changed")),
            playbackState: window.BuckyApi?.onEvent("playback_state_changed", onApiEvent("playback_state_changed")),
            recordingError: window.BuckyApi?.onEvent("recording_error", onApiEvent("recording_error")),
            interruptBegin: window.BuckyApi?.onEvent("audio_interruption_begin", onApiEvent("audio_interruption_begin")),
            interruptEnd: window.BuckyApi?.onEvent("audio_interruption_end", onApiEvent("audio_interruption_end")),
        };

        function highlight(el) {
            el.classList.remove("highlight");
            void el.offsetWidth;
            el.classList.add("highlight");
        }

        function renderLogs() {
            outputBox.value = logLines.join("\n\n");
            outputBox.scrollTop = outputBox.scrollHeight;
            highlight(outputBox);
        }

        function appendLog(title, payload) {
            logLines.push(`[${new Date().toLocaleTimeString()}] ${title}\n${JSON.stringify(payload, null, 2)}`);
            renderLogs();
            console.log(`[test_audio] ${title}`, payload);
        }

        function logResult(title, payload) {
            appendLog(title, payload);
        }

        function logError(err) {
            appendLog("error", { message: err });
            console.error("[test_audio] error", err);
        }

        async function runRecordingSmoke() {
            const logs = [];
            const push = (step, payload) => {
                const entry = { step, payload };
                logs.push(entry);
                appendLog(`record-smoke:${step}`, payload);
            };

            try {
                push("getRecordingPermissions", await window.BuckyApi.getRecordingPermissions());
                const ready = await window.BuckyApi.checkRecordingReadiness();
                push("checkRecordingReadiness", ready);
                if (ready?.code !== 0 || !ready?.data?.ready) {
                    logResult("Auto Run (stopped)", logs);
                    return;
                }

                const started = await window.BuckyApi.startRecording({ sample_rate: 44100, channels: 1, format: "wav" });
                push("startRecording", started);
                const recordId = started?.data?.record_id;
                if (!recordId) {
                    logResult("Auto Run (failed)", logs);
                    return;
                }

                recordIdInput.value = recordId;
                await sleep(1200);
                push("getRecordingStatus", await window.BuckyApi.getRecordingStatus());
                push("stopRecording", await window.BuckyApi.stopRecording(recordId));
                push("getRecordingFileInfo", await window.BuckyApi.getRecordingFileInfo(recordId));
                logResult("Auto Run (done)", logs);
            } catch (err) {
                push("error", err instanceof Error ? err.message : String(err));
                logResult("Auto Run (error)", logs);
            }
        }

        async function playInHtmlAudio(recordId) {
            const result = await window.BuckyApi.getRecordingUrl(recordId);
            return result;
        }

        appendLog("environment", {
            href: window.location.href,
            sessionStartedAt,
            autoMode,
            directInvokeAvailable,
            hasTauriInternals: Boolean(window.__TAURI_INTERNALS__),
            embedded: Boolean(window.parent && window.parent !== window),
            buckyApiAvailable: Boolean(window.BuckyApi),
            userAgent: window.navigator.userAgent,
        });

        if (!window.BuckyApi) {
            logError("BuckyApi unavailable: open test_audio.html inside embedded app page");
        } else {
            console.log("[test_audio] environment", {
                autoMode,
                directInvokeAvailable,
                embedded: window.parent && window.parent !== window,
            });
        }

        permGetButton.addEventListener("click", async () => {
            try {
                logResult("getRecordingPermissions", await window.BuckyApi.getRecordingPermissions());
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        permReqButton.addEventListener("click", async () => {
            try {
                logResult("requestRecordingPermissions", await window.BuckyApi.requestRecordingPermissions());
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        readyCheckButton.addEventListener("click", async () => {
            try {
                logResult("checkRecordingReadiness", await window.BuckyApi.checkRecordingReadiness());
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        recStartButton.addEventListener("click", async () => {
            try {
                const result = await window.BuckyApi.startRecording({ sample_rate: 44100, channels: 1, format: "wav" });
                if (result?.code === 0 && result?.data?.record_id) {
                    recordIdInput.value = result.data.record_id;
                }
                logResult("startRecording", result);
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        recPauseButton.addEventListener("click", async () => {
            try {
                logResult("pauseRecording", await window.BuckyApi.pauseRecording(getRecordId()));
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        recResumeButton.addEventListener("click", async () => {
            try {
                logResult("resumeRecording", await window.BuckyApi.resumeRecording(getRecordId()));
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        recStopButton.addEventListener("click", async () => {
            try {
                const result = await window.BuckyApi.stopRecording(getRecordId());
                logResult("stopRecording", result);
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        recCancelButton.addEventListener("click", async () => {
            try {
                const result = await window.BuckyApi.cancelRecording(getRecordId());
                logResult("cancelRecording", result);
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        recStatusButton.addEventListener("click", async () => {
            try {
                logResult("getRecordingStatus", await window.BuckyApi.getRecordingStatus());
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        recInfoButton.addEventListener("click", async () => {
            try {
                logResult("getRecordingFileInfo", await window.BuckyApi.getRecordingFileInfo(getRecordId()));
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        recReadButton.addEventListener("click", async () => {
            try {
                const result = await window.BuckyApi.readRecordingFile(getRecordId(), 0, 2048);
                logResult("readRecordingFile(0,2048)", {
                    ...result,
                    data: result?.data
                        ? {
                            ...result.data,
                            chunk_base64: `${String(result.data.chunk_base64 || "").slice(0, 120)}...`,
                        }
                        : result?.data,
                });
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        recUrlButton.addEventListener("click", async () => {
            try {
                const result = await playInHtmlAudio(getRecordId());
                logResult("getRecordingUrl", result);
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        recExportButton.addEventListener("click", async () => {
            try {
                logResult(
                    "exportRecordingFile",
                    await window.BuckyApi.exportRecordingFile(getRecordId(), exportPathInput.value.trim())
                );
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        interruptButton.addEventListener("click", async () => {
            try {
                logResult("markAudioInterruptionBegin", await window.BuckyApi.markAudioInterruptionBegin("test_interrupt"));
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        interruptEndButton.addEventListener("click", async () => {
            try {
                logResult("markAudioInterruptionEnd", await window.BuckyApi.markAudioInterruptionEnd());
            } catch (err) {
                logError(err instanceof Error ? err.message : String(err));
            }
        });

        runAllButton.addEventListener("click", async () => {
            const logs = [];
            const push = (step, payload) => logs.push({ step, payload });

            try {
                const ready = await window.BuckyApi.checkRecordingReadiness();
                push("checkRecordingReadiness", ready);
                if (ready?.code !== 0 || !ready?.data?.ready) {
                    logResult("Run E2E (stopped)", logs);
                    return;
                }

                const started = await window.BuckyApi.startRecording({ sample_rate: 44100, channels: 1, format: "wav" });
                push("startRecording", started);
                const recordId = started?.data?.record_id;
                if (!recordId) {
                    logResult("Run E2E (failed)", logs);
                    return;
                }
                recordIdInput.value = recordId;

                await sleep(700);
                push("pauseRecording", await window.BuckyApi.pauseRecording(recordId));
                await sleep(250);
                push("resumeRecording", await window.BuckyApi.resumeRecording(recordId));
                await sleep(900);

                push("stopRecording", await window.BuckyApi.stopRecording(recordId));
                const urlResult = await playInHtmlAudio(recordId);
                push("getRecordingUrl", urlResult);
                push("getPlaybackStatus", await window.BuckyApi.getPlaybackStatus());

                logResult("Run E2E (done)", logs);
            } catch (err) {
                push("error", err instanceof Error ? err.message : String(err));
                logResult("Run E2E (error)", logs);
            }
        });

        openListButton.addEventListener("click", () => {
            window.location.href = "/test_audio_list.html";
        });

        if (autoMode === "record-smoke" && window.BuckyApi) {
            window.setTimeout(() => {
                void runRecordingSmoke();
            }, 400);
        }
    </script>
</body>

</html>
